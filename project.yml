name: BilingualKeyboard
options:
  bundleIdPrefix: com.core7.bikey
  deploymentTarget:
    iOS: "16.4"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.1"
    IPHONEOS_DEPLOYMENT_TARGET: "16.4"
    DEVELOPMENT_TEAM: "4KS6YS23KT"
    CODE_SIGN_STYLE: Automatic
    # KeyboardCore consumes AzooKey + SwiftyMarisa (C++) under the Zenzai trait,
    # so Xcode targets that link KeyboardCore need C++ interop enabled.
    SWIFT_CXX_INTEROPERABILITY_MODE: default
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
    CLANG_CXX_LIBRARY: libc++
    OTHER_SWIFT_FLAGS: -cxx-interoperability-mode=default -Xcc -std=gnu++17

packages:
  KeyboardCore:
    path: .
  KeyboardKit:
    url: https://github.com/KeyboardKit/KeyboardKit.git
    from: 10.4.1
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.18.4

targets:
  BilingualKeyboard:
    type: application
    platform: iOS
    sources:
      - path: iOS/Container
        excludes:
          - Resources/Info.plist
      - path: public/bg.png
      - path: public/background.png
      - path: public/onboardbg.png
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.core7.bikey
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: iOS/Container/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: iOS/Container/Container.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: KeyboardExtension
      # The keyboard extension loads package-provided dynamic frameworks via
      # @executable_path/../../Frameworks, so the containing app must embed them.
      - package: KeyboardCore
        product: KeyboardCore
      - package: KeyboardKit
        product: KeyboardKit

  KeyboardExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: iOS/KeyboardExtension
        excludes:
          - Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.core7.bikey.KeyboardExtension
        PRODUCT_MODULE_NAME: KeyboardExtension
        INFOPLIST_FILE: iOS/KeyboardExtension/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: iOS/KeyboardExtension/KeyboardExtension.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../Frameworks"
    dependencies:
      - package: KeyboardCore
        product: EnglishKeyboardCore
      - package: KeyboardKit
        product: KeyboardKit

  BilingualKeyboardSnapshotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: iOS/ContainerTests
    resources:
      - path: public/home.png
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.core7.bikey.snapshot-tests
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: BilingualKeyboard
      - package: SnapshotTesting
        product: SnapshotTesting

schemes:
  BilingualKeyboard:
    build:
      targets:
        BilingualKeyboard: all
        KeyboardExtension: all
    test:
      targets:
        - BilingualKeyboardSnapshotTests
  KeyboardExtension:
    build:
      targets:
        KeyboardExtension: all
